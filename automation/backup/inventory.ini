# ============================================================
# Network Device Inventory Template
#
# - 실제 장비명, 관리 IP, 계정 정보는 환경에 맞게 교체한다.
# - 아래 IP 대역(192.0.2.0/24, 198.51.100.0/24)은 문서 예시용이다.
# - 운영 환경에서는 ansible_password 값을 직접 적기보다 Ansible Vault 사용을 권장한다.
# ============================================================

[nxos]
NXOS-DEVICE-01 ansible_host=192.0.2.10
NXOS-DEVICE-02 ansible_host=192.0.2.11

[nxos:vars]
ansible_user=YOUR_USERNAME
ansible_password=YOUR_PASSWORD
ansible_network_os=cisco.nxos.nxos
ansible_connection=ansible.netcommon.network_cli
ansible_become=true
ansible_become_method=enable
ansible_become_password=YOUR_ENABLE_PASSWORD

[ios]
IOS-DEVICE-01 ansible_host=198.51.100.10

[ios:vars]
ansible_user=YOUR_USERNAME
ansible_password=YOUR_PASSWORD
ansible_network_os=cisco.ios.ios
ansible_connection=ansible.netcommon.network_cli
ansible_become=true
ansible_become_method=enable
ansible_become_password=YOUR_ENABLE_PASSWORD
